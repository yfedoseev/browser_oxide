# cargo-deny configuration for browser_oxide.
#
# Run locally:    cargo deny check
# Run all rules:  cargo deny check all
# Update DB:      cargo deny check advisories
#
# CI enforces this via the `deny` job in .github/workflows/ci.yml.
#
# Policy summary:
#   - Licenses: permissive only (MIT, Apache-2.0, BSD-3, ISC, Zlib, Unicode,
#     CDLA-Permissive-2.0). NO AGPL, NO GPL/LGPL. MPL-2.0 is denied EXCEPT two
#     cited transitive/optional exceptions (cooked-waker, adblock) carved out
#     in [licenses.exceptions] below. Mechanically enforced here.
#   - Sources: crates.io only. Reject git/path/registry alternatives.
#   - Advisories: fail on any known security vulnerability.

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ============================================================================
# Advisories
# ============================================================================

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# Explicit ignores. Each MUST cite the reason and an expiry-or-reason note.
# All current entries are transitive through `deno_core 0.311 → v8`; we
# cannot drop them without forking the V8 stack. Re-evaluate on every
# deno_core bump.
ignore = [
  { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15: unmaintained proc-macro, pulled in by v8. No drop-in upgrade (pastey is a soft fork). Re-evaluate on next deno_core bump." },
  { id = "RUSTSEC-2025-0056", reason = "adler 1.0.2: unmaintained, pulled in by v8 build-deps via miniz_oxide. adler2 is the maintained successor; resolves when v8 ships a newer miniz_oxide." },
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3: unmaintained, pulled in by deno_core. Not a security issue; the bincode team stopped development. Re-evaluate on next deno_core bump or a community fork." },
]

# ============================================================================
# Licenses
# ============================================================================

[licenses]
# Threshold for license-text matching confidence. 0.93 catches near-duplicates
# of the canonical text while still flagging genuinely unusual variants.
confidence-threshold = 0.93

# Allow-list. NO AGPL, NO GPL/LGPL. Permissive only — except for one
# explicit MPL-2.0 exception (cooked-waker) listed below.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",            # webpki-roots ships Mozilla cert data under this
  "0BSD",
  "BSL-1.0",
  "MIT-0",
  "CC0-1.0",
]

# Per-crate exceptions. MPL-2.0 is *file-scope* copyleft: only modified
# MPL-licensed source files need to stay MPL. Linking from MIT/Apache
# code is fine and does not infect downstream. Each entry MUST cite the
# reason and the transitive root that pulls it in.
exceptions = [
  # cooked-waker is pulled in by deno_core 0.311 → v8. We do not vendor
  # or modify it, just link against it. Removing requires forking the
  # V8 stack. Re-evaluate on every deno_core bump.
  { name = "cooked-waker", allow = ["MPL-2.0"] },
  # adblock is the engine behind the optional `blocker` feature in the
  # `net` crate (off by default). Default builds do not pull it.
  { name = "adblock", allow = ["MPL-2.0"] },
]

# Explicit clarifications for crates whose license metadata is ambiguous
# but the actual licensing is clear from upstream.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# Bans
# ============================================================================

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Hard-deny copyleft and AGPL even if they sneak in via a clarification.
deny = [
  # Add named crates here if they appear with copyleft-only licensing.
]
skip = []
skip-tree = []

# ============================================================================
# Sources
# ============================================================================

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
