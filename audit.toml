# cargo-audit configuration. Kept in sync with the `[advisories].ignore` list in
# deny.toml — both must justify every ignore. These are all *unmaintained*
# advisories (not vulnerabilities) for transitive deps pulled in by v8/deno_core,
# with no drop-in replacement available yet; re-evaluate on the next deno_core bump.
[advisories]
ignore = [
  "RUSTSEC-2024-0436", # paste 1.0.15: unmaintained proc-macro, via v8. No drop-in (pastey is a soft fork).
  "RUSTSEC-2025-0056", # adler 1.0.2: unmaintained, via v8 build-deps (miniz_oxide). adler2 is the successor.
  "RUSTSEC-2025-0141", # bincode 1.3.3: unmaintained, via deno_core. Not a security issue.
]
