name: Release MCP binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: browser-oxide-mcp (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { runner: macos-14,       target: aarch64-apple-darwin }
          - { runner: macos-13,       target: x86_64-apple-darwin }
          - { runner: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release -p browser_oxide_mcp --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin=browser-oxide-mcp
          [ "${{ runner.os }}" = "Windows" ] && bin="$bin.exe"
          tar -czf "browser-oxide-mcp-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" "$bin"
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: browser-oxide-mcp-${{ matrix.target }}.tar.gz
