name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Gating jobs: fmt, test, msrv, deny. Clippy is ADVISORY
  # (continue-on-error, no -D warnings) while a pre-existing lint
  # backlog is cleared — see the `clippy` job below. `cargo build` /
  # `cargo test` keep default warning levels.

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (advisory)
    runs-on: ubuntu-latest
    # Clippy currently runs in advisory mode (continue-on-error). The
    # engine carries a backlog of clippy lints accumulated during the
    # 2026-04 → 2026-05 build sprint — see SCOPE.md / fix-list issues
    # for the cleanup tracker. Once the backlog is closed, flip
    # `continue-on-error: false` and add `-D warnings`.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets --workspace

  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          # Catch upcoming Rust changes on Linux/beta only.
          - os: ubuntu-latest
            rust: beta
    steps:
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.rust }}

      - name: Build (debug)
        run: cargo build --workspace

      # V8 isolates are per-thread — the project enforces single-threaded
      # tests (see CLAUDE.md). Network-bound and live anti-bot tests are
      # `#[ignore]` and not run here.
      - name: Test (single-threaded — V8 constraint)
        run: cargo test --workspace --no-fail-fast -- --test-threads=1
        env:
          CARGO_INCREMENTAL: "0"

      - name: Build documentation (warnings as errors)
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      # 1.83 is the floor of what deno_core 0.311 + V8 prebuilts compile
      # against. Bump in step with the deno_core dep, not freely.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # MSRV
        with:
          toolchain: "1.83"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --workspace

  deny:
    name: cargo-deny (licenses + advisories + sources)
    runs-on: ubuntu-latest
    # Mechanical enforcement of the workspace policy at deny.toml:
    # MIT/Apache-only licenses, crates.io-only sources, fail on advisories.
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2
        with:
          command: check all
